<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70" role="img" aria-label="Adept AI Agency">
  <title>Adept AI Agency</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- ── Node Network Icon ────────────────────────────────────── -->
  <!-- Connector lines -->
  <line x1="20" y1="52" x2="38" y2="12" stroke="#1D9E75" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="38" y1="12" x2="56" y2="52" stroke="#1D9E75" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="27" y1="36" x2="49" y2="36" stroke="#1D9E75" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Bottom-left node -->
  <circle cx="20" cy="52" r="7" fill="#085041"/>
  <!-- Bottom-right node -->
  <circle cx="56" cy="52" r="7" fill="#085041"/>
  <!-- Apex node (top) — largest, brightest -->
  <circle cx="38" cy="12" r="9" fill="#1D9E75"/>
  <!-- Crossbar left node -->
  <circle cx="27" cy="36" r="4.5" fill="#0F6E56"/>
  <!-- Crossbar right node -->
  <circle cx="49" cy="36" r="4.5" fill="#0F6E56"/>

  <!-- ── Vertical rule divider ─────────────────────────────────── -->
  <line x1="76" y1="10" x2="76" y2="60" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Wordmark ───────────────────────────────────────────────── -->
  <!-- ADEPT — near black, bold -->
  <text
    x="88" y="38"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="1.5"
    fill="#085041"
  >ADEPT</text>

  <!-- AI — forest teal, slightly smaller, tracking out -->
  <text
    x="88" y="57"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="600"
    letter-spacing="5"
    fill="#1D9E75"
  >AI</text>
</svg>
